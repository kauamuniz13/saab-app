// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function el(tag,props,...children){
  const e=document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') e.className=v;
    else if(k==='value'&&(tag==='input'||tag==='select'||tag==='textarea')) e.value=v;
    else if(k==='placeholder') e.placeholder=v;
    else if(k==='type') e.type=v;
    else if(k==='rows') e.rows=v;
    else if(k==='selected') { if(v) e.selected=true; }
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false||c===undefined) return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return e;
}

function css(s){const t=document.createElement('style');t.textContent=s;document.head.appendChild(t);}

  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

`);

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if(!STATE.stock){
    app.appendChild(el('div',{style:{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',color:MUT}},'Carregando...'));
    return;
  }
  if(!STATE.session){ app.appendChild(renderLogin()); return; }
  const isAdmin=STATE.session.role==='admin';
  app.appendChild(isAdmin?renderAdmin():renderRestaurant());
  if(STATE.modal) app.appendChild(renderModal());
  if(STATE.toast) app.appendChild(renderToast());
}

  btn.textContent='Entrar';

function renderHeader(tabs,activeTab,onTab,onLogout){
  const hdr=el('header',{style:{background:'#0D0E10',borderBottom:`1px solid ${BOR}`,position:'sticky',top:0,zIndex:50}});
  const inner=el('div',{style:{maxWidth:860,margin:'0 auto',padding:'10px 16px',display:'flex',alignItems:'center',gap:12}});

  const logoImg=el('img',{src:LOGO,style:{width:36,height:36,borderRadius:'50%',border:`2px solid ${RED}`,objectFit:'cover',flexShrink:0}});
  const logoText=el('div',{});
  const n=el('div',{style:{fontWeight:800,fontSize:18,letterSpacing:3,color:'#fff',lineHeight:1}});
  n.textContent='SAAB';
  const s=el('div',{style:{fontSize:9,color:MUT,letterSpacing:1,textTransform:'uppercase'}});
  s.textContent='Distribuidora';
  logoText.append(n,s);

  const nav=el('nav',{style:{marginLeft:'auto',display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}});
  tabs.forEach(([id,icon,label])=>{
    const btn=el('button',{style:{
      background:activeTab===id?RED:'transparent',
      border:`1px solid ${activeTab===id?RED:BOR}`,
      color:'#fff',borderRadius:8,padding:'5px 9px',fontSize:11,
      display:'flex',flexDirection:'column',alignItems:'center',gap:1,
    }});
    const ic=el('span',{}); ic.textContent=icon;
    const lb=el('span',{style:{fontSize:9,lineHeight:1.2}}); lb.textContent=label;
    btn.append(ic,lb);
    btn.addEventListener('click',()=>onTab(id));
    // pending badge for pedidos
    if(id==='pedidos'){
      const pending=STATE.orders.filter(o=>o.status==='pending').length;
      if(pending>0){
        const badge=el('span',{style:{position:'absolute',top:-4,right:-4,background:RED,color:'#fff',borderRadius:'50%',width:14,height:14,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800}});
        badge.textContent=pending;
        btn.style.position='relative';
        btn.append(badge);
      }
    }
    nav.append(btn);
  });

  const logout=el('button',{style:{background:'transparent',border:`1px solid ${BOR}`,color:MUT,borderRadius:8,padding:'5px 9px',fontSize:11}});
  logout.textContent='🚪';
  logout.addEventListener('click',onLogout);
  nav.append(logout);

  inner.append(logoImg,logoText,nav);
  hdr.append(inner);
  return hdr;
}

function renderEstImport(){
  const wrap=el('div',{className:'up'});
  wrap.append(secTitle('📥 Importar Nova Contagem'));
  const desc=el('p',{style:{fontSize:13,color:MUT,marginBottom:14,lineHeight:1.6}});
  desc.textContent='Cole a lista no formato QTD NOME — igual ao WhatsApp. Os produtos do setor serão substituídos.';
  wrap.append(desc);

  wrap.append(secTitle('Setor'));
  const btns=el('div',{style:{display:'flex',flexWrap:'wrap',gap:7,marginBottom:14}});
  STATE.stock.sectors.forEach(s=>{
    const active=STATE.impSid===s.id;
    const btn=el('button',{style:{background:active?RED:CARD,border:`1px solid ${active?RED:BOR}`,color:'#fff',borderRadius:8,padding:'6px 12px',fontSize:12}});
    btn.textContent=`${s.icon} ${s.label}`;
    btn.addEventListener('click',()=>{ STATE.impSid=s.id; render(); });
    btns.append(btn);
  });
  wrap.append(btns);

  wrap.append(secTitle('Lista'));
  const ta=el('textarea',{rows:12,placeholder:'74 PICANHA GORINA\n40 FLAP MEAT URUGUAI\n...',style:{width:'100%',background:'#111',border:`1px solid ${BOR}`,borderRadius:8,color:'#f0f0f0',padding:'11px 13px',fontSize:13,resize:'vertical',lineHeight:1.7,marginBottom:12}});
  ta.value=STATE.impTxt;
  ta.addEventListener('input',e=>{ STATE.impTxt=e.target.value; });

  const btRow=el('div',{style:{display:'flex',gap:10}});
  const clrBtn=el('button',{style:{flex:1,background:'transparent',border:`1px solid ${BOR}`,color:MUT,borderRadius:8,padding:'9px',fontSize:13}});
  clrBtn.textContent='Limpar';
  clrBtn.addEventListener('click',()=>{ STATE.impTxt=''; STATE.impSid=''; render(); });
  const impBtn=el('button',{style:{flex:2,background:RED,border:'none',color:'#fff',borderRadius:8,padding:'9px',fontWeight:700,fontSize:13}});
  impBtn.textContent='Importar';
  impBtn.addEventListener('click',()=>{
    if(!STATE.impSid||!STATE.impTxt.trim()){flash('⚠️ Selecione setor e cole a lista');return;}
    const parsed=STATE.impTxt.trim().split('\n').filter(l=>l.trim()).map(l=>{
      const m=l.trim().match(/^(\d+)\s+(.+)$/);
      return m?{id:`${STATE.impSid}-${uid()}`,qty:Number(m[1]),name:m[2].trim().toUpperCase()}:null;
    }).filter(Boolean);
    if(!parsed.length){flash('⚠️ Nenhuma linha reconhecida');return;}
    const ns=JSON.parse(JSON.stringify(STATE.stock));
    ns.sectors.find(x=>x.id===STATE.impSid).products=parsed;
    ns.lastUpdate=today();
    ss(SK.stock,ns);
    flash(`✅ ${parsed.length} produtos importados`);
    setState({stock:ns,impTxt:'',impSid:'',estView:'map'});
  });
  btRow.append(clrBtn,impBtn);
  wrap.append(btRow);
  return wrap;
}

function renderAdminPedidos(){
  const wrap=el('div',{className:'up'});
  wrap.append(secTitle('Pedidos Recebidos'));
  if(!STATE.orders.length){
    const e=el('div',{style:{textAlign:'center',color:MUT,padding:'40px 0',fontSize:13}}); e.textContent='Nenhum pedido ainda.'; wrap.append(e); return wrap;
  }
  const SC={pending:AMB,approved:GRN,rejected:'#ef4444',invoiced:BLU};
  const SL={pending:'Aguardando',approved:'Aprovado',rejected:'Recusado',invoiced:'Faturado'};
  STATE.orders.forEach(o=>{
    const card=el('div',{className:'up',style:{background:CARD,border:`1px solid ${BOR}`,borderRadius:12,padding:'14px 16px',marginBottom:10}});
    const top=el('div',{style:{display:'flex',alignItems:'flex-start',gap:10}});
    const info=el('div',{style:{flex:1}});
    const nm=el('div',{style:{fontWeight:700,fontSize:14}}); nm.textContent=o.clientName;
    const dt=el('div',{style:{fontSize:11,color:MUT,marginTop:2}}); dt.textContent=`${o.date} · ${o.items.length} item(s)`;
    const its=el('div',{style:{fontSize:12,color:MUT,marginTop:6,lineHeight:1.5}});
    its.textContent=o.items.map(i=>`${i.qty}x ${i.name}${i.weight?` (${i.weight}kg)`:''}`).join(' · ');
    info.append(nm,dt,its);
    if(o.note){ const n=el('div',{style:{fontSize:11,color:MUT,marginTop:5,fontStyle:'italic'}}); n.textContent=`"${o.note}"`; info.append(n); }
    const badge=el('span',{style:{fontSize:11,fontWeight:700,borderRadius:6,padding:'3px 10px',flexShrink:0,color:SC[o.status],background:SC[o.status]+'25'}});
    badge.textContent=SL[o.status];
    top.append(info,badge);

    const acts=el('div',{style:{display:'flex',gap:8,marginTop:12}});
    if(o.status==='pending'){
      const ap=el('button',{style:{background:GRN,border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:600}});
      ap.textContent='✓ Aprovar';
      ap.addEventListener('click',()=>{
        const no=STATE.orders.map(x=>x.id===o.id?{...x,status:'approved'}:x);
        ss(SK.orders,no); setState({orders:no}); flash('✅ Aprovado');
      });
      const re=el('button',{style:{background:'#991b1b',border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:600}});
      re.textContent='✕ Recusar';
      re.addEventListener('click',()=>{
        const no=STATE.orders.map(x=>x.id===o.id?{...x,status:'rejected'}:x);
        ss(SK.orders,no); setState({orders:no}); flash('❌ Recusado');
      });
      acts.append(ap,re);
    }
    if(o.status==='approved'){
      const inv=el('button',{style:{background:BLU,border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:600}});
      inv.textContent='🧾 Gerar Invoice';
      inv.addEventListener('click',()=>{
        const invoice={id:`INV-${uid().slice(0,5).toUpperCase()}`,orderId:o.id,clientId:o.clientId,clientName:o.clientName,items:o.items,date:today(),createdAt:Date.now(),signed:false};
        const ni=[invoice,...STATE.invoices];
        const no=STATE.orders.map(x=>x.id===o.id?{...x,status:'invoiced',invoiceId:invoice.id}:x);
        ss(SK.invoices,ni); ss(SK.orders,no);
        setState({invoices:ni,orders:no}); flash(`🧾 Invoice ${invoice.id} gerado!`);
      });
      acts.append(inv);
    }
    if(o.status==='invoiced'){
      const t=el('span',{style:{fontSize:11,color:BLU,fontWeight:600}}); t.textContent=`#${o.invoiceId}`; acts.append(t);
    }
    card.append(top,acts); wrap.append(card);
  });
  return wrap;
}

    const il=el('div',{style:{fontSize:10,color:MUT}}); il.textContent='INVOICE';
    const iv=el('div',{style:{fontWeight:800,fontSize:20,color:RED}}); iv.textContent=`#${inv.id}`;
    const id2=el('div',{style:{fontSize:11,color:MUT}}); id2.textContent=`Data: ${inv.date}`;
    idBox.append(il,iv,id2); top.append(brand,idBox); card.append(top);

    const cBox=el('div',{style:{background:'#111',borderRadius:8,padding:'10px 14px',marginBottom:16}});
    const cl=el('div',{style:{fontSize:10,color:MUT,marginBottom:3}}); cl.textContent='CLIENTE';
    const cn=el('div',{style:{fontSize:15,fontWeight:700}}); cn.textContent=inv.clientName;
    cBox.append(cl,cn); card.append(cBox);

    const hRow=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 48px 70px 60px 75px',gap:6,fontSize:10,color:MUT,textTransform:'uppercase',letterSpacing:1,padding:'4px 8px',marginBottom:4}});
    ['Produto','Qtd','Peso','Preço','Total'].forEach(h=>{ const s=el('span',{style:{textAlign:['Qtd','Peso','Preço','Total'].includes(h)?'right':'left'}}); s.textContent=h; hRow.append(s); });
    card.append(hRow);

    let total=0;
    inv.items.forEach((it,i)=>{
      const row=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 48px 70px 60px 75px',gap:6,background:i%2===0?'#111':'transparent',borderRadius:6,padding:'8px 8px',fontSize:12}});
      const sub=(Number(it.price||0)*Number(it.qty));
      total+=sub;
      [it.name,it.qty,it.weight?`${it.weight}kg`:'—',`$${Number(it.price||0).toFixed(2)}`,`$${sub.toFixed(2)}`].forEach((t,ti)=>{
        const s=el('span',{style:{textAlign:ti>0?'right':'left',fontWeight:ti===4?700:400}}); s.textContent=t; row.append(s);
      });
      card.append(row);
    });

    const totRow=el('div',{style:{borderTop:`1px solid ${BOR}`,paddingTop:12,display:'flex',justifyContent:'flex-end',marginBottom:20}});
    const totBox=el('div',{style:{textAlign:'right'}});
    const tl=el('div',{style:{fontSize:11,color:MUT}}); tl.textContent='TOTAL';
    const tv=el('div',{style:{fontWeight:800,fontSize:30,color:RED}}); tv.textContent=`$${total.toFixed(2)}`;
    totBox.append(tl,tv); totRow.append(totBox); card.append(totRow);

    const sigBox=el('div',{style:{borderTop:`1px solid ${BOR}`,paddingTop:14}});
    if(inv.signed){
      const s=el('div',{style:{textAlign:'center',color:GRN,fontWeight:700,fontSize:14}}); s.textContent=`✅ Assinado em ${inv.signedAt}`; sigBox.append(s);
    } else {
      const sl=el('div',{style:{fontSize:11,color:MUT,marginBottom:8}}); sl.textContent='Assinatura do cliente:';
      const line=el('div',{style:{height:1,background:BOR,marginBottom:20}});
      const sb=el('button',{style:{width:'100%',background:RED,border:'none',color:'#fff',borderRadius:8,padding:'10px',fontWeight:700}});
      sb.textContent='✅ Confirmar Assinatura';
      sb.addEventListener('click',()=>{
        const ni=STATE.invoices.map(x=>x.id===inv.id?{...x,signed:true,signedAt:today()}:x);
        ss(SK.invoices,ni); setState({invoices:ni}); flash('✅ Assinado');
      });
      sigBox.append(sl,line,sb);
    }
    card.append(sigBox);
    wrap.append(back,card);
    return wrap;
  }

  wrap.append(secTitle('Invoices Gerados'));
  if(!STATE.invoices.length){
    const e=el('div',{style:{textAlign:'center',color:MUT,padding:'40px 0',fontSize:13}}); e.textContent='Nenhum invoice ainda.'; wrap.append(e); return wrap;
  }
  STATE.invoices.forEach(inv=>{
    const total=inv.items.reduce((a,it)=>a+(Number(it.price||0)*Number(it.qty)),0);
    const row=el('div',{className:'hrow up',style:{background:CARD,border:`1px solid ${BOR}`,borderRadius:12,padding:'14px 16px',marginBottom:8,cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'background .15s'}});
    const info=el('div',{style:{flex:1}});
    const id=el('div',{style:{fontWeight:700,fontSize:13}}); id.textContent=`#${inv.id}`;
    const sub=el('div',{style:{fontSize:12,color:MUT,marginTop:2}}); sub.textContent=`${inv.clientName} · ${inv.date}`;
    info.append(id,sub);
    const right=el('div',{style:{textAlign:'right'}});
    const tv=el('div',{style:{fontWeight:800,fontSize:20,color:RED}}); tv.textContent=`$${total.toFixed(2)}`;
    const ts=el('div',{style:{fontSize:10,color:inv.signed?GRN:AMB,fontWeight:700}}); ts.textContent=inv.signed?'✅ Assinado':'Pendente';
    right.append(tv,ts);
    const ar=el('span',{style:{color:MUT}}); ar.textContent='→';
    row.append(info,right,ar);
    row.addEventListener('click',()=>setState({selInvoice:inv.id}));
    wrap.append(row);
  });
  return wrap;
}

// ═══════════════════════════════════════════════════════
// ROTAS
// ═══════════════════════════════════════════════════════
const COMPANY={id:'hq',name:'SAAB Distribuidora',address:'6843 S Conway Rd, Suite #120, Orlando, FL',openTime:'06:00'};
const DRIVERS=[
  {id:'herbert',name:'Herbert',color:RED},
  {id:'renato', name:'Renato', color:BLU},
  {id:'trip',   name:'Trip',   color:GRN},
];

function renderRotas(){
  const wrap=el('div',{className:'up'});
  const dr=DRIVERS.find(d=>d.id===STATE.activeDriver);

  // Header
  const hRow=el('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}});
  hRow.append(secTitle('Rotas por Motorista'));
  const buildBtn=el('button',{style:{marginLeft:'auto',background:CARD,border:`1px solid ${BOR}`,color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:600}});
  buildBtn.textContent='🗺 Montar Rotas';
  buildBtn.addEventListener('click',()=>{
    const routes={};
    DRIVERS.forEach(d=>{
      const dClients=STATE.clients.filter(c=>(c.driver||'herbert')===d.id);
      const dStops=(STATE.stops||[]).filter(s=>s.driver===d.id);
      const all=[...dClients,...dStops].map(c=>({...c,pending:STATE.orders.filter(o=>o.clientId===c.id&&(o.status==='approved'||o.status==='invoiced')).length}));
      routes[d.id]=[...all].sort((a,b)=>a.openTime.localeCompare(b.openTime));
    });
    setState({routes});flash('🗺 Rotas montadas!');
  });
  const addCBtn=el('button',{style:{background:RED,border:'none',color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:600}});
  addCBtn.textContent='+ Cliente';
  addCBtn.addEventListener('click',()=>setState({modal:{type:'client',c:null},form:{name:'',address:'',openTime:'08:00',driver:STATE.activeDriver}}));
  hRow.append(buildBtn,addCBtn);
  wrap.append(hRow);

  // Driver tabs
  const tabs=el('div',{style:{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}});
  DRIVERS.forEach(d=>{
    const active=STATE.activeDriver===d.id;
    const rt=(STATE.routes||{})[d.id]||[];
    const btn=el('button',{style:{background:active?d.color:CARD,border:`1px solid ${active?d.color:BOR}`,color:'#fff',borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:600}});
    btn.textContent=`🚚 ${d.name}${rt.length>0?' ('+rt.length+')':''}`;
    btn.addEventListener('click',()=>setState({activeDriver:d.id}));
    tabs.append(btn);
  });
  wrap.append(tabs);

  // Company HQ
  const hqCard=el('div',{style:{background:CARD,border:`1px solid ${dr.color}`,borderRadius:12,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}});
  const hqIc=el('div',{style:{fontSize:22}}); hqIc.textContent='🏭';
  const hqInfo=el('div',{style:{flex:1}});
  const hqName=el('div',{style:{fontWeight:700,fontSize:13,color:'#fff'}}); hqName.textContent=COMPANY.name;
  const hqAddr=el('div',{style:{fontSize:11,color:MUT}}); hqAddr.textContent=`📍 ${COMPANY.address}`;
  hqInfo.append(hqName,hqAddr);
  const hqBadge=el('span',{style:{fontSize:10,color:dr.color,fontWeight:700,background:dr.color+'22',borderRadius:6,padding:'3px 8px'}}); hqBadge.textContent='BASE';
  hqCard.append(hqIc,hqInfo,hqBadge); wrap.append(hqCard);

  // Route result
  const drRoute=(STATE.routes||{})[STATE.activeDriver]||[];
  if(drRoute.length>0){
    const routeBox=el('div',{style:{background:'linear-gradient(135deg,#0A1525,#142038)',border:`1px solid ${dr.color}`,borderRadius:14,padding:'16px 18px',marginBottom:20}});
    const rtTitle=el('div',{style:{fontWeight:800,fontSize:16,color:'#fff',marginBottom:12}});
    rtTitle.textContent=`🗺 Rota ${dr.name} — saída + ${drRoute.length} paradas + retorno`;
    routeBox.append(rtTitle);

    const mkStop=(num,name,sub,color,badge)=>{
      const row=el('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:10}});
      const circle=el('div',{style:{width:28,height:28,borderRadius:'50%',background:color||RED,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13,color:'#fff',flexShrink:0}});
      circle.textContent=num;
      const info=el('div',{style:{flex:1}});
      const nm=el('div',{style:{fontSize:13,fontWeight:600}}); nm.textContent=name;
      const sb=el('div',{style:{fontSize:11,color:'#6B93D4'}}); sb.textContent=sub;
      info.append(nm,sb); row.append(circle,info);
      if(badge){ const b=el('span',{style:{background:RED+'25',color:RED,fontSize:10,fontWeight:700,borderRadius:6,padding:'2px 8px'}}); b.textContent=badge; row.append(b); }
      return row;
    };

    routeBox.append(mkStop('S',COMPANY.name,`📍 ${COMPANY.address} · Partida`,dr.color));
    drRoute.forEach((c,i)=>routeBox.append(mkStop(i+1,c.name,`🕐 ${c.openTime} · 📍 ${c.address}`,dr.color,c.pending>0?`${c.pending} pedido(s)`:null)));
    routeBox.append(mkStop('R',COMPANY.name,`📍 ${COMPANY.address} · Retorno`,dr.color));

    const hint=el('div',{style:{marginTop:10,paddingTop:10,borderTop:'1px solid rgba(255,255,255,.08)',fontSize:11,color:'#6B93D4'}});
    hint.textContent='💡 Ordenado por horário de abertura';
    routeBox.append(hint); wrap.append(routeBox);
  }

  // Clients list
  const drClients=STATE.clients.filter(c=>(c.driver||'herbert')===STATE.activeDriver);
  wrap.append(secTitle(`Clientes — ${dr.name}`));
  drClients.forEach(c=>{
    const pending=STATE.orders.filter(o=>o.clientId===c.id&&o.status==='approved').length;
    const row=el('div',{style:{background:CARD,border:`1px solid ${BOR}`,borderRadius:12,padding:'12px 16px',marginBottom:8,display:'flex',alignItems:'center',gap:12}});
    const ic=el('div',{style:{width:34,height:34,borderRadius:10,background:RED+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}); ic.textContent='🍽';
    const info=el('div',{style:{flex:1}});
    const nm=el('div',{style:{fontSize:14,fontWeight:700}}); nm.textContent=c.name;
    const addr=el('div',{style:{fontSize:11,color:MUT,marginTop:2}}); addr.textContent=`📍 ${c.address} · 🕐 ${c.openTime}`;
    info.append(nm,addr);
    if(pending>0){ const pb=el('div',{style:{fontSize:11,color:RED,marginTop:2,fontWeight:600}}); pb.textContent=`${pending} pedido(s) aprovado(s)`; info.append(pb); }

    // Move driver select
    const sel=el('select',{style:{background:'#111',border:`1px solid ${BOR}`,borderRadius:6,color:'#f0f0f0',padding:'4px 8px',fontSize:11,cursor:'pointer'}});
    DRIVERS.forEach(d=>{ const opt=el('option',{value:d.id}); opt.textContent=d.name; if(d.id===(c.driver||'herbert')) opt.selected=true; sel.append(opt); });
    sel.addEventListener('change',e=>{
      const nc=STATE.clients.map(x=>x.id===c.id?{...x,driver:e.target.value}:x);
      ss(SK.clients,nc); setState({clients:nc}); flash('↔️ Rota alterada');
    });

    const acts=el('div',{style:{display:'flex',gap:6}});
    const edit=el('button',{style:{background:'#1F2520',border:'none',borderRadius:6,padding:'5px 7px',fontSize:12}}); edit.textContent='✏️';
    edit.addEventListener('click',()=>setState({modal:{type:'client',c},form:{name:c.name,address:c.address,openTime:c.openTime,driver:c.driver||'herbert'}}));
    const del=el('button',{style:{background:'#2D1515',border:'none',borderRadius:6,padding:'5px 7px',fontSize:12}}); del.textContent='🗑';
    del.addEventListener('click',()=>{
      const nc=STATE.clients.filter(x=>x.id!==c.id);
      ss(SK.clients,nc); setState({clients:nc}); flash('🗑 Removido');
    });
    acts.append(edit,del); row.append(ic,info,sel,acts);
    wrap.append(row);
  });
  if(!drClients.length){ const e=el('div',{style:{textAlign:'center',color:MUT,padding:'30px 0',fontSize:13}}); e.textContent='Nenhum cliente nesta rota.'; wrap.append(e); }

  return wrap;
}

  const wrap=el('div',{className:'up'});

  hRow.append(secTitle('⚙️ Usuários & Acessos'));

  addBtn.addEventListener('click',()=>setState({modal:{type:'user',u:null},form:{name:'',user:'',pass:'',role:'restaurant',clientId:''}}));

    const det=el('div',{style:{fontSize:11,color:MUT,marginTop:2}});
    det.innerHTML=`Login: <b style="color:#f0f0f0">${u.user}</b> · Senha: <b style="color:#f0f0f0">${u.pass}</b> · <span style="color:${u.role==='admin'?RED:BLU}">${u.role==='admin'?'Admin':'Restaurante'}</span>`;

    const acts=el('div',{style:{display:'flex',gap:6}});
    const edit=el('button',{style:{background:'#1F2520',border:'none',borderRadius:6,padding:'5px 7px',fontSize:12}}); edit.textContent='✏️';
    edit.addEventListener('click',()=>setState({modal:{type:'user',u},form:{name:u.name,user:u.user,pass:u.pass,role:u.role,clientId:u.clientId||''}}));

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function renderModal(){
  const m=STATE.modal;
  const overlay=el('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.78)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:20}});
  const box=el('div',{className:'up',style:{background:'#1E2024',border:`1px solid ${BOR}`,borderRadius:16,padding:24,width:'100%',maxWidth:380,maxHeight:'90vh',overflowY:'auto'}});
  overlay.addEventListener('click',()=>setState({modal:null}));
  box.addEventListener('click',e=>e.stopPropagation());

  const mkLabel=(txt)=>{ const l=el('div',{style:{fontSize:10,color:MUT,textTransform:'uppercase',letterSpacing:1,marginBottom:6,fontWeight:600,marginTop:4}}); l.textContent=txt; return l; };
  const mkInput=(type,val,ph,onChange)=>{
    const inp=el('input',{type:type||'text',placeholder:ph||'',style:{width:'100%',background:'#111',border:`1px solid ${BOR}`,borderRadius:8,color:'#f0f0f0',padding:'10px 13px',fontSize:14,marginBottom:12}});
    inp.value=val||'';
    inp.addEventListener('input',e=>onChange(e.target.value));
    return inp;
  };

  if(m.type==='product'){
    const title=el('div',{style:{fontWeight:800,fontSize:22,marginBottom:4}}); title.textContent=m.p?'Editar Produto':'Novo Produto';
    const sub=el('div',{style:{fontSize:11,color:MUT,marginBottom:18}}); sub.textContent=STATE.stock.sectors.find(s=>s.id===m.sid)?.label||'';
    box.append(title,sub);
    box.append(mkLabel('Nome'));
    box.append(mkInput('text',STATE.form.name,'PICANHA GORINA',v=>{ STATE.form.name=v; }));
    box.append(mkLabel('Quantidade'));
    box.append(mkInput('number',STATE.form.qty,'0',v=>{ STATE.form.qty=v; }));
  }

  if(m.type==='client'){
    const title=el('div',{style:{fontWeight:800,fontSize:22,marginBottom:18}}); title.textContent=m.c?'Editar Cliente':'Novo Cliente';
    box.append(title);
    box.append(mkLabel('Nome'));
    box.append(mkInput('text',STATE.form.name,'Restaurante El Bohío',v=>{ STATE.form.name=v; }));
    box.append(mkLabel('Endereço'));
    box.append(mkInput('text',STATE.form.address,'123 Main St',v=>{ STATE.form.address=v; }));
    box.append(mkLabel('Horário de Abertura'));
    box.append(mkInput('time',STATE.form.openTime,'',v=>{ STATE.form.openTime=v; }));
    box.append(mkLabel('Motorista'));
    const sel=el('select',{style:{width:'100%',background:'#111',border:`1px solid ${BOR}`,borderRadius:8,color:'#f0f0f0',padding:'10px 13px',fontSize:14,marginBottom:12}});
    DRIVERS.forEach(d=>{ const opt=el('option',{value:d.id}); opt.textContent=d.name; if(d.id===STATE.form.driver) opt.selected=true; sel.append(opt); });
    sel.addEventListener('change',e=>{ STATE.form.driver=e.target.value; });
    box.append(sel);
  }

  if(m.type==='user'){
    const title=el('div',{style:{fontWeight:800,fontSize:22,marginBottom:18}}); title.textContent=m.u?'Editar Usuário':'Novo Usuário';
    box.append(title);
    box.append(mkLabel('Nome')); box.append(mkInput('text',STATE.form.name,'',v=>{ STATE.form.name=v; }));
    box.append(mkLabel('Usuário (login)')); box.append(mkInput('text',STATE.form.user,'',v=>{ STATE.form.user=v; }));
    box.append(mkLabel('Senha')); box.append(mkInput('text',STATE.form.pass,'',v=>{ STATE.form.pass=v; }));
    box.append(mkLabel('Tipo'));
    const sel=el('select',{style:{width:'100%',background:'#111',border:`1px solid ${BOR}`,borderRadius:8,color:'#f0f0f0',padding:'10px 13px',fontSize:14,marginBottom:12}});
    [['admin','Admin (equipe SAAB)'],['restaurant','Restaurante (cliente)']].forEach(([v,lbl])=>{ const opt=el('option',{value:v}); opt.textContent=lbl; if(v===STATE.form.role) opt.selected=true; sel.append(opt); });
    sel.addEventListener('change',e=>{ STATE.form.role=e.target.value; });
    box.append(sel);
  }

  // Buttons
  const btRow=el('div',{style:{display:'flex',gap:10,marginTop:8}});
  const cancelBtn=el('button',{style:{flex:1,background:'transparent',border:`1px solid ${BOR}`,color:MUT,borderRadius:8,padding:10,cursor:'pointer'}});
  cancelBtn.textContent='Cancelar';
  cancelBtn.addEventListener('click',()=>setState({modal:null}));

  const saveBtn=el('button',{style:{flex:2,background:RED,border:'none',color:'#fff',borderRadius:8,padding:10,cursor:'pointer',fontWeight:700}});
  saveBtn.textContent='Salvar';
  saveBtn.addEventListener('click',()=>{
    if(m.type==='product'){
      if(!STATE.form.name.trim()||!STATE.form.qty) return;
      const ns=JSON.parse(JSON.stringify(STATE.stock));
      const sec=ns.sectors.find(s=>s.id===m.sid);
      if(m.p){ const i=sec.products.findIndex(p=>p.id===m.p.id); sec.products[i]={...m.p,name:STATE.form.name.toUpperCase(),qty:Number(STATE.form.qty)}; flash('✅ Atualizado'); }
      else { sec.products.push({id:`${m.sid}-${uid()}`,name:STATE.form.name.toUpperCase(),qty:Number(STATE.form.qty)}); flash('✅ Adicionado'); }
      ss(SK.stock,ns); setState({stock:ns,modal:null});
    }
    if(m.type==='client'){
      if(!STATE.form.name.trim()||!STATE.form.address.trim()) return;
      if(m.c){ const nc=STATE.clients.map(c=>c.id===m.c.id?{...c,...STATE.form}:c); ss(SK.clients,nc); setState({clients:nc,modal:null}); flash('✅ Atualizado'); }
      else { const nc=[...STATE.clients,{id:uid(),...STATE.form}]; ss(SK.clients,nc); setState({clients:nc,modal:null}); flash('✅ Adicionado'); }
    }
    if(m.type==='user'){
      if(!STATE.form.name.trim()||!STATE.form.user.trim()||!STATE.form.pass.trim()) return;
      if(m.u){ const nu=STATE.users.map(u=>u.id===m.u.id?{...u,...STATE.form}:u); ss(SK.users,nu); setState({users:nu,modal:null}); flash('✅ Atualizado'); }
      else { const nu=[...STATE.users,{id:`u-${uid()}`,...STATE.form}]; ss(SK.users,nu); setState({users:nu,modal:null}); flash('✅ Adicionado'); }
    }
  });
  btRow.append(cancelBtn,saveBtn); box.append(btRow);
  overlay.append(box);
  return overlay;
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function renderToast(){
